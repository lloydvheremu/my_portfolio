<!--
  SEO Head Template for Lloyd Vheremu Portfolio
  Copy this into each page's <head> section and customize title, description, and canonical URL
-->

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Page-specific meta (CUSTOMIZE PER PAGE) -->
  <meta name="description" content="Full-Stack Developer with 2+ years building production systems in Python and JavaScript. Open to remote opportunities.">
  <title>Lloyd Vheremu | Software Developer</title>
  <link rel="canonical" href="https://yourdomain.com/">

  <!-- SEO -->
  <meta name="robots" content="index, follow">
  <meta name="author" content="Lloyd Blessing Vheremu">
  <meta name="keywords" content="Software Developer, Full-Stack Developer, Python, JavaScript, Django, Next.js, Odoo, Remote Developer">

  <!-- Favicons -->
  <link rel="icon" href="/my_portfolio/favicon.svg" type="image/svg+xml">
  <link rel="manifest" href="/my_portfolio/manifest.json">

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://yourdomain.com/">
  <meta property="og:title" content="Lloyd Vheremu | Software Developer">
  <meta property="og:description" content="Full-Stack Developer with 2+ years building production systems in Python and JavaScript. Open to remote opportunities.">
  <meta property="og:image" content="https://yourdomain.com/assets/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:site_name" content="Lloyd Vheremu">
  <meta property="og:locale" content="en_US">

  <!-- Twitter/X Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:url" content="https://yourdomain.com/">
  <meta name="twitter:title" content="Lloyd Vheremu | Software Developer">
  <meta name="twitter:description" content="Full-Stack Developer with 2+ years building production systems in Python and JavaScript. Open to remote opportunities.">
  <meta name="twitter:image" content="https://yourdomain.com/assets/og-image.png">

  <!-- Mobile / PWA -->
  <meta name="theme-color" content="#00ff41" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#00b300" media="(prefers-color-scheme: light)">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="LBV Portfolio">

  <!-- Performance -->
  <link rel="dns-prefetch" href="//api.github.com">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Fira+Code:wght@300;400;500&display=swap" rel="stylesheet">

  <!-- Stylesheets -->
  <link rel="stylesheet" href="/css/global.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/effects.css">
</head>
